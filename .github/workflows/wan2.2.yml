name: wan2.2

on:
  workflow_dispatch:
    inputs:
      text_input:
        description: "Text dari Google Sheet"
        required: true

jobs:
  generate-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run video generator
        run: |
          python generate_video.py "${{ github.event.inputs.text_input }}"
